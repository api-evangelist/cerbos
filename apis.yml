apis:
  - aid: cerbos:cerbos-pdp-rest-api
    name: Cerbos PDP REST API
    description: >-
      The Cerbos PDP REST API is the HTTP/JSON interface for sending
      authorization requests to a running Cerbos Policy Decision Point. It
      exposes CheckResources for evaluating principal-against-resource
      decisions, PlanResources for translating policies into resource-filter
      query plans, and ServerInfo for runtime metadata. An OpenAPI / Swagger
      specification is served by every PDP instance.
    humanURL: https://docs.cerbos.dev/cerbos/latest/api/index
    baseURL: http://localhost:3592
    tags:
      - CheckResources
      - PDP
      - PlanResources
      - REST
    properties:
      - type: Documentation
        url: https://docs.cerbos.dev/cerbos/latest/api/index
      - type: OpenAPI
        url: https://docs.cerbos.dev/cerbos/latest/api/swagger.json
      - type: Reference
        url: https://docs.cerbos.dev/cerbos/latest/api/index#api-resources
  - aid: cerbos:cerbos-pdp-grpc-api
    name: Cerbos PDP gRPC API
    description: >-
      The Cerbos PDP gRPC API exposes the cerbos.svc.v1.CerbosService and
      related management services on port 3593, with server reflection
      enabled. The gRPC interface is the highest-performance way to embed
      Cerbos as a sidecar or in-process service for service-to-service
      authorization.
    humanURL: https://docs.cerbos.dev/cerbos/latest/api/index
    baseURL: localhost:3593
    tags:
      - gRPC
      - PDP
      - Protocol Buffers
    properties:
      - type: Documentation
        url: https://docs.cerbos.dev/cerbos/latest/api/index
      - type: Protocol
        url: https://github.com/cerbos/cerbos/tree/main/api/genpb
  - aid: cerbos:cerbos-authzen-api
    name: Cerbos AuthZEN API
    description: >-
      Cerbos implements the OpenID AuthZEN authorization API specification,
      exposing standards-compliant single-evaluation, batch-evaluations, and
      well-known metadata endpoints so that any AuthZEN-conformant client or
      Policy Enforcement Point can integrate with Cerbos as the decision
      engine.
    humanURL: https://docs.cerbos.dev/cerbos/latest/api/index
    tags:
      - AuthZEN
      - OpenID
      - Standards
    properties:
      - type: Documentation
        url: https://docs.cerbos.dev/cerbos/latest/api/index#authzen
      - type: Specification
        url: https://openid.net/specs/authorization-api-1_0.html
      - type: Discovery
        url: https://docs.cerbos.dev/cerbos/latest/api/index#authzen
  - aid: cerbos:cerbos-admin-api
    name: Cerbos PDP Admin API
    description: >-
      The Cerbos Admin API provides management capabilities such as policy
      add/get/list, schema management, and audit log access on the running
      PDP. It is intended for administrative use and is gated by HTTP Basic
      Auth.
    humanURL: https://docs.cerbos.dev/cerbos/latest/api/admin_api
    tags:
      - Admin
      - Audit Log
      - Policy Management
    properties:
      - type: Documentation
        url: https://docs.cerbos.dev/cerbos/latest/api/admin_api
  - aid: cerbos:cerbos-hub-api
    name: Cerbos Hub API
    description: >-
      Cerbos Hub is the cloud-hosted Policy Administration Point (PAP) that
      manages policy authoring, versioning, validation, and distribution to
      Cerbos PDPs across environments. It also provides decision logs,
      collaborative policy editing, and embedded PDP delivery.
    humanURL: https://docs.cerbos.dev/cerbos-hub/
    tags:
      - Cloud
      - Hub
      - Policy Administration
      - Policy Distribution
    properties:
      - type: Documentation
        url: https://docs.cerbos.dev/cerbos-hub/
      - type: Console
        url: https://hub.cerbos.cloud/
  - aid: cerbos:cerbos-synapse
    name: Cerbos Synapse
    description: >-
      Cerbos Synapse is the enrichment and orchestration component that
      fetches identity, resource, and relationship attributes from external
      systems and translates infrastructure protocols (HTTP, gRPC, GraphQL)
      into Cerbos authorization checks for ReBAC and ABAC scenarios.
    humanURL: https://www.cerbos.dev/products/synapse
    tags:
      - Enrichment
      - ReBAC
      - Synapse
    properties:
      - type: Documentation
        url: https://www.cerbos.dev/products/synapse
