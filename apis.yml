aid: cerbos
name: Cerbos
description: >-
  Cerbos is an open-core, language-agnostic, scalable authorization platform
  that decouples access control from application code by externalizing
  fine-grained, context-aware permission decisions into policy-as-code.
  Authorization is expressed in YAML policies supporting RBAC, ABAC, PBAC,
  and ReBAC, evaluated by a stateless Policy Decision Point (PDP) that
  delivers sub-millisecond decisions at scale. The platform consists of the
  open-source Cerbos PDP (Apache 2.0), Cerbos Hub control plane (PAP),
  Cerbos Synapse enrichment layer, and PEP SDKs for Go, Java, JavaScript /
  TypeScript, .NET, PHP, Python, Ruby, and Rust. The PDP exposes both REST
  (port 3592) and gRPC (port 3593) interfaces, an Admin API, and standards-
  compliant OpenID AuthZEN endpoints, with query-plan adapters for Prisma
  and SQLAlchemy.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - ABAC
  - Access Control
  - Authorization
  - AuthZEN
  - Open Source
  - PBAC
  - PDP
  - Permissions
  - Policy as Code
  - RBAC
  - ReBAC
  - Zero Trust
